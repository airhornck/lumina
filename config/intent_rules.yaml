# Intent 规则配置
# 支持热加载，修改后自动生效

# ========== Casual 闲聊规则 ==========
casual:
  # 问候语
  - "^你好$|^您好$|^哈喽$|^嗨$|^在吗$|^在么$|^有人吗$"
  - "^早上好$|^下午好$|^晚上好$|^早啊$|^晚安$"
  
  # 感谢/告别
  - "^谢谢$|^感谢$|^多谢$|^谢了$|^谢啦$|^不客气$|^拜拜$|^再见$"
  - "^好的$|^嗯嗯$|^嗯$|^好哒$|^ok$|^OK$|^👋$|^哈哈$|^哈哈哈$"
  
  # 英文问候
  - "^\\s*hi\\s*$|^\\s*hello\\s*$|^\\s*hey\\s*$|^\\s*thanks\\s*$|^\\s*bye\\s*$"
  
  # 生活闲聊
  - "天气|气温|下雨|下雪|刮风|台风|雾霾|冷不冷|热不热"
  - "几点|星期几|周几|今天.*号|现在.*时间"
  - "讲个笑话|讲个段子|讲故事|唱首歌"
  - "你是谁|你能做什么|你会什么|介绍一下"
  - "晚饭吃|午饭吃|早餐吃|外卖吃|睡不着|累死了|无聊"
  
  # 情绪表达
  - "^开心$|^难过$|^郁闷$|^兴奋$|^累$|^烦$"

# ========== Marketing 营销规则 ==========
marketing:
  # 账号诊断
  - "(诊断|分析|看看|体检|评估).*(账号|号|主页|数据)"
  - "账号.*(问题|好不好|怎么样|评估|还有救|废了没)"
  - "帮(我)?(看|瞧).{0,6}号|看看(我)?(这|这个)?号"
  - "(.*)?(诊断|体检)(.*)?"
  
  # 内容创作
  - "(写|生成|创作|改|优化).*(文案|标题|正文|内容)"
  - "文案.*(怎么写|建议|优化|创作)"
  - "(种草|推广).*(文案|内容|标题)"
  - "(.*)?标题(.*)?怎么写(.*)?"
  
  # 脚本创作
  - "(脚本|分镜|口播|视频).*(创作|生成|写|制作)"
  - "短视频.*(脚本|文案|创作)"
  - "(.*)?分镜(.*)?怎么写(.*)?"
  
  # 选题/定位策略
  - "(选题|方向|定位|人设|IP).*(建议|思路|怎么做|规划)"
  - "(怎么|如何).*(定位|选题|起号|做号)"
  - "账号.*(定位|方向|人设)"
  - "(.*)?人设(.*)?怎么(.*)?定(.*)?"
  
  # 流量分析
  - "(流量|曝光|播放|阅读).*(分析|差|掉|优化|提升)"
  - "(互动率|CTR|转化|完播).*(分析|优化|提升)"
  - "为什么.*(没流量|没人看|不涨粉|掉粉)"
  - "(.*)?流量(.*)?不好(.*)?"
  
  # 风险检查
  - "(风险|违规|审核|敏感词|违禁|限流).*(检查|检测|排查)"
  - "(内容|文案|脚本).*(违规|敏感|风险)"
  - "会不会.*(限流|违规|被封|被禁)"
  
  # 平台运营
  - "(小红书|抖音|B站|视频号|快手).*(运营|推广|怎么做|诊断)"
  - "(.*)?平台.*怎么(.*)?玩(.*)?"
  
  # 爆款/方法论
  - "(爆款|热门|trending).*(方法|技巧|思路|公式|密码)"
  - "(AIDA|定位理论|钩子|方法论|SOP|增长黑客|4P|4C|漏斗)"
  
  # 竞品分析
  - "(竞品|对手|对标).*(分析|监测|看看|研究)"
  
  # 矩阵管理
  - "(矩阵|多账号|批量).*(管理|运营|发布|规划|搭建)"
  - "(主号|卫星号).*(策略|规划|协同)"
  - "批量.*(账号|发布|管理)"
  
  # 知识问答
  - "(知识库|问答|什么是|怎么做|为什么).*(营销|运营|小红书|抖音)"
  - "(.*)?方法论(.*)?推荐(.*)?"

# ========== 子类型规则 ==========
subtypes:
  diagnosis:
    - "(诊断|体检|看看).*(账号|号|主页)"
    - "账号.*(问题|好不好|怎么样|评估)"
    - "帮.*看.*号"
  
  content_creation:
    - "(写|生成|创作).*(文案|标题|正文)"
    - "文案.*(怎么写|建议|优化)"
    - "(种草|推广).*(文案|内容)"
  
  script_creation:
    - "(脚本|分镜|口播).*(创作|生成|写)"
    - "短视频.*(脚本|文案)"
  
  strategy:
    - "(选题|方向|定位|人设).*(建议|思路|怎么做)"
    - "(怎么|如何).*(定位|选题|起号)"
    - "账号.*(定位|方向)"
  
  traffic_analysis:
    - "(流量|曝光|播放).*(分析|差|掉|优化)"
    - "(互动率|CTR|转化).*(分析|优化)"
    - "为什么.*(没流量|没人看|不涨粉)"
  
  risk_check:
    - "(风险|违规|审核|敏感词).*(检查|检测|排查)"
    - "(内容|文案).*(违规|敏感|风险)"
  
  matrix_setup:
    - "(矩阵|多账号).*(规划|搭建|管理)"
    - "(主号|卫星号).*(策略|规划)"
  
  bulk_creation:
    - "批量.*(创作|生成|发布)"
    - "一稿多改|多版本"
  
  competitor:
    - "(竞品|对手|对标).*(分析|监测|研究)"
  
  knowledge_qa:
    - "(什么是|怎么做|为什么).*(营销|运营)"
    - "方法论.*推荐"

# ========== 全局热门模式（冷启动用） ==========
global_hot_patterns:
  - text: "帮我看看这个账号"
    type: "marketing"
    subtype: "diagnosis"
  - text: "诊断一下账号"
    type: "marketing"
    subtype: "diagnosis"
  - text: "写个文案"
    type: "marketing"
    subtype: "content_creation"
  - text: "生成标题"
    type: "marketing"
    subtype: "content_creation"
  - text: "选题建议"
    type: "marketing"
    subtype: "strategy"
  - text: "怎么定位"
    type: "marketing"
    subtype: "strategy"
  - text: "流量分析"
    type: "marketing"
    subtype: "traffic_analysis"
  - text: "为什么没流量"
    type: "marketing"
    subtype: "traffic_analysis"
  - text: "检查风险"
    type: "marketing"
    subtype: "risk_check"
  - text: "你好"
    type: "casual"
  - text: "在吗"
    type: "casual"
  - text: "谢谢"
    type: "casual"

# ========== 动态阈值配置 ==========
threshold:
  base: 0.7                    # 基础阈值
  high_active_bonus: -0.1      # 高活跃用户（>50对话）阈值降低
  medium_active_bonus: -0.05   # 中活跃用户（>20对话）阈值降低
  marketing_context_bonus: -0.05  # 上一轮是营销意图时的奖励
  min_threshold: 0.5           # 最小阈值
  max_threshold: 0.85          # 最大阈值

# ========== 意图切换检测配置 ==========
switch_detection:
  penalty_threshold: 2         # 触发澄清的切换次数阈值
  check_subtypes: true         # 是否检查子类型切换
