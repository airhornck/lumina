methodology_id: "big_idea"
name: "大创意包装"
category: "Creative_Strategy"
description: "将核心创意概念进行系统性包装和延展，确保跨媒介传播的一致性与冲击力。"
core_philosophy: "一个伟大的创意需要完整的执行方案（包装）来支撑，形成整合营销传播合力。"
applicable_scenarios: ["ad_campaign", "brand_design", "imc", "brand", "awareness", "differentiation"]
success_cases: ["品牌口号出圈", "系列内容统一记忆点"]
prompt_templates:
  core_concept: "提炼一个反直觉或高共鸣的核心洞察，一句话能说清，贯穿始终的单一、有力的创意主张"
  visual_identity: "统一的色彩、字体、图像风格，形成视觉锤，确保跨媒介传播的视觉一致性"
  copy_tone: "符合品牌个性的语言风格，保持一致的声音，在标题、封面、正文、结尾中重复核心符号"
  storyline: "支撑大创意的具体叙事内容，赋予品牌厚度，将零散的营销活动整合成强有力的品牌印象"
steps:
  - step_id: "core_concept"
    theory: "pattern_interrupt"
    agent_role: "strategy"
    skill_call:
      name: "generate_text"
      params:
        topic: "核心洞察"
        content_dna: {}
        methodology_hint: "BigIdea-Insight"
  - step_id: "visual_identity"
    theory: "visual_hammer"
    agent_role: "creative"
    skill_call:
      name: "generate_text"
      params:
        topic: "视觉锤设计"
        content_dna: {}
        methodology_hint: "BigIdea-Visual"
  - step_id: "copy_tone"
    theory: "consistent_voice"
    agent_role: "creative"
    skill_call:
      name: "generate_text"
      params:
        topic: "品牌语调定义"
        content_dna: {}
        methodology_hint: "BigIdea-Tone"
  - step_id: "storyline"
    theory: "narrative_depth"
    agent_role: "creative"
    skill_call:
      name: "generate_text"
      params:
        topic: "品牌故事线"
        content_dna: {}
        methodology_hint: "BigIdea-Storyline"
