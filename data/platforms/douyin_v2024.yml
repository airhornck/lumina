platform_id: "douyin"
content_dna:
  - element: "hook_position"
    value: "0-3s"
audit_rules:
  - category: "medical"
    forbidden_terms: ["治愈", "根治"]

content_formats:
  短视频:
    title:
      max_chars: 55
      min_chars: 1
      default: "15-25"
    video_size:
      max: "4GB"
    video_duration:
      max: "60分钟"
      default: "15-60秒"
    video_format:
      recommended: ["mp4", "mov"]
    video_resolution:
      recommended: "1080P(1920*1080)及以上"
      ratio: "9:16竖屏为主"
    content:
      default: "50-200"
    tags:
      max_count: 5
    cover:
      recommendation: "前三帧或上传封面图"
  图文:
    pic_num:
      max: 35
      min: 2
      default: "3-9"
    title:
      max_chars: 55
      min_chars: 1
      default: "15-25"
    content:
      default: "100-500"
    tags:
      max_count: 5
