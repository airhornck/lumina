<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumina 调试对话</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div class="brand">
          <span class="logo">Lumina</span>
          <span class="sub">流式调试 · 4 个独立服务 · 记忆隔离</span>
        </div>
        <button type="button" class="btn ghost" id="btn-theme" title="切换主题">主题</button>
      </header>

      <div class="layout">
        <aside class="panel left">
          <h2>会话</h2>
          <label class="field">
            <span>User ID</span>
            <input type="text" id="userId" autocomplete="off" spellcheck="false" />
          </label>
          <label class="field">
            <span>对话 ID</span>
            <input type="text" id="convId" autocomplete="off" spellcheck="false" />
          </label>
          <div class="row">
            <button type="button" class="btn small" id="btnNewUser">新 User</button>
            <button type="button" class="btn small" id="btnNewConv">新对话</button>
          </div>

          <h2>服务接口</h2>
          <p class="hint">
            选择下方服务调用对应的新 API。记忆按 User + 对话 ID + Service 三元组隔离。
          </p>
          <select id="service" class="select"></select>

          <label class="field hidden" id="positioningModeWrap">
            <span>定位模式</span>
            <select id="positioningMode" class="select">
              <option value="case">定位决策案例库 (case)</option>
              <option value="matrix">内容定位矩阵 (matrix)</option>
            </select>
          </label>

          <label class="field hidden" id="contextFieldWrap">
            <span>编排上下文 JSON（可选，仅系统对话）</span>
            <textarea id="contextJson" rows="4" class="mono" placeholder='context JSON，例如 {"industry":"美妆","metrics":{"views":1200}}'></textarea>
          </label>

          <label class="field">
            <span>平台（可选）</span>
            <input type="text" id="platform" placeholder="xiaohongshu / douyin …" />
          </label>

          <div class="row stack">
            <button type="button" class="btn danger outline" id="btnClearMem">清空本服务记忆</button>
            <button type="button" class="btn outline" id="btnRefreshMem">刷新记忆面板</button>
          </div>
        </aside>

        <main class="chat">
          <div class="messages" id="messages" aria-live="polite"></div>
          <div class="composer">
            <textarea
              id="input"
              rows="3"
              placeholder="输入消息…（Enter 发送，Shift+Enter 换行）"
            ></textarea>
            <div class="composer-actions">
              <span class="status" id="status"></span>
              <button type="button" class="btn primary" id="btnSend">发送</button>
              <button type="button" class="btn outline" id="btnStop" disabled>停止</button>
            </div>
          </div>
        </main>

        <aside class="panel right">
          <div class="mem-head">
            <h2>记忆窗口</h2>
            <span class="badge" id="memCount">0 条</span>
          </div>
          <pre class="mem-json" id="memJson">[]</pre>
        </aside>
      </div>
    </div>
    <script src="app.js?v=2"></script>
  </body>
</html>
